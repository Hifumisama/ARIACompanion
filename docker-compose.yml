services:
  # ── LLM (Ollama) ──────────────────────────────────────────────
  aria-brain-models:
    image: ollama/ollama
    container_name: aria-brain-models
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - aria-net

  aria-brain-models-init:
    image: ollama/ollama
    container_name: aria-brain-models-init
    depends_on:
      aria-brain-models:
        condition: service_healthy
    entrypoint: ["sh", "-c", "ollama pull ${OLLAMA_MODEL:-llama3.2}"]
    environment:
      - OLLAMA_HOST=http://aria-brain-models:11434
    networks:
      - aria-net

  # ── Voice (STT + TTS) ─────────────────────────────────────────
  aria-voice:
    build: ./aria-voice
    container_name: aria-voice
    ports:
      - "${VOICE_PORT:-8001}:8000"
    volumes:
      - ./aria-voice/models/piper:/app/models/piper:ro
      - ./aria-voice/models/whisper:/app/models/whisper:rw
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-fr}
      - PIPER_MODEL_PATH=/app/models/piper/model.onnx
      - PIPER_CONFIG_PATH=/app/models/piper/model.onnx.json
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aria-net

  # ── Character Forge (Backend) ──────────────────────────────────
  aria-character-forge-backend:
    build: ./aria-character-forge/backend
    container_name: aria-character-forge-backend
    ports:
      - "${FORGE_BACKEND_PORT:-8002}:8000"
    volumes:
      - forge_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aria-net

  # ── Character Forge (Frontend) ─────────────────────────────────
  aria-character-forge-frontend:
    build:
      context: ./aria-character-forge/frontend
      args:
        VITE_API_URL: http://localhost:${FORGE_BACKEND_PORT:-8002}
        VITE_OLLAMA_URL: http://localhost:${OLLAMA_PORT:-11434}
    container_name: aria-character-forge-frontend
    ports:
      - "${FORGE_FRONTEND_PORT:-5174}:5174"
    depends_on:
      - aria-character-forge-backend
    networks:
      - aria-net

  # ── Orchestrator ───────────────────────────────────────────────
  aria-orchestrator:
    build: ./aria-orchestrator
    container_name: aria-orchestrator
    ports:
      - "${ORCHESTRATOR_PORT:-4545}:8000"
    environment:
      - BRAIN_URL=http://aria-brain-models:11434
      - VOICE_URL=http://aria-voice:8000
      - CHARACTER_FORGE_URL=http://aria-character-forge-backend:8000
      - ACTIVE_CHARACTER_ID=${ACTIVE_CHARACTER_ID:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - INTERRUPTION_KEYWORDS=${INTERRUPTION_KEYWORDS:-stop,arrête,tais-toi}
      - TTS_CHUNK_SIZE=${TTS_CHUNK_SIZE:-16384}
    depends_on:
      aria-brain-models:
        condition: service_healthy
      aria-brain-models-init:
        condition: service_completed_successfully
      aria-voice:
        condition: service_healthy
      aria-character-forge-backend:
        condition: service_healthy
    networks:
      - aria-net

  # ── UI Frontend ────────────────────────────────────────────────
  aria-ui-frontend:
    build: ./aria-ui-frontend
    container_name: aria-ui-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_WS_URL=ws://localhost:${ORCHESTRATOR_PORT:-4545}/ws
      - VITE_API_URL=http://localhost:${ORCHESTRATOR_PORT:-4545}
    depends_on:
      - aria-orchestrator
    networks:
      - aria-net

networks:
  aria-net:
    driver: bridge

volumes:
  ollama_data:
  forge_data:
