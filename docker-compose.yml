services:
  brain:
    build: ./brain
    container_name: aria-brain
    ports:
      - "${BRAIN_PORT:-8080}:8080"
    environment:
      - MODEL_FILE=${MODEL_FILE:-model.gguf}
      - GPU_LAYERS=${GPU_LAYERS:-0}
      - CONTEXT_SIZE=${CONTEXT_SIZE:-4096}
      - THREADS=${THREADS:-4}
    volumes:
      - ./brain/models:/models:ro
    networks:
      - aria-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  orchestrator:
    build: ./orchestrator
    container_name: aria-orchestrator
    ports:
      - "${ORCHESTRATOR_PORT:-4545}:8000"
    volumes:
      - ./brain/prompts:/prompts:ro
      - ./models/piper:/models/piper:ro
      - aria_memory:/app/data
    environment:
      - BRAIN_URL=http://brain:8080
      - SYSTEM_PROMPT_PATH=/prompts/aria.txt
      - SUMMARY_INTERVAL=${SUMMARY_INTERVAL:-10}
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-fr}
      - PIPER_MODEL_PATH=/models/piper/model.onnx
      - PIPER_CONFIG_PATH=/models/piper/model.onnx.json
    depends_on:
      brain:
        condition: service_healthy
    networks:
      - aria-net

  frontend:
    build: ./frontend
    container_name: aria-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_WS_URL=ws://localhost:${ORCHESTRATOR_PORT:-4545}/ws
      - VITE_API_URL=http://localhost:${ORCHESTRATOR_PORT:-4545}
    depends_on:
      - orchestrator
    networks:
      - aria-net

networks:
  aria-net:
    driver: bridge

volumes:
  aria_memory:
