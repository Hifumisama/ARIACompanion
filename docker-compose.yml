services:
  model-init:
    build: ./init
    container_name: aria-model-init
    volumes:
      - ./models/llm:/models/llm
    environment:
      - MODEL_FILE=${MODEL_FILE:-hades-v1.gguf}
      - LLM_REPO_ID=${LLM_REPO_ID:-Hifumisama/hades-finetune-llm-gguf}
      - HF_TOKEN=${HF_TOKEN:-}
    networks:
      - aria-net

  brain:
    build: ./brain
    container_name: aria-brain
    ports:
      - "${BRAIN_PORT:-8080}:8080"
    volumes:
      - ./models/llm:/models:ro
    command: >
      -m /models/${MODEL_FILE:-hades-v1.gguf}
      --host 0.0.0.0
      --port 8080
      -ngl ${GPU_LAYERS:-0}
      -c ${CONTEXT_SIZE:-4096}
      --threads ${THREADS:-4}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      model-init:
        condition: service_completed_successfully
    networks:
      - aria-net

  orchestrator:
    build: ./orchestrator
    container_name: aria-orchestrator
    ports:
      - "${ORCHESTRATOR_PORT:-4545}:8000"
    volumes:
      - ./brain/prompts:/prompts:ro
      - ./models/piper:/models/piper:ro
      - ./models/whisper:/models/whisper:rw
      - aria_memory:/app/data
    environment:
      - BRAIN_URL=http://brain:8080
      - SYSTEM_PROMPT_PATH=/prompts/aria.txt
      - SUMMARY_INTERVAL=${SUMMARY_INTERVAL:-10}
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-fr}
      - PIPER_MODEL_PATH=/models/piper/model.onnx
      - PIPER_CONFIG_PATH=/models/piper/model.onnx.json
    depends_on:
      brain:
        condition: service_healthy
    networks:
      - aria-net

  frontend:
    build: ./frontend
    container_name: aria-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_WS_URL=ws://localhost:${ORCHESTRATOR_PORT:-4545}/ws
      - VITE_API_URL=http://localhost:${ORCHESTRATOR_PORT:-4545}
    depends_on:
      - orchestrator
    networks:
      - aria-net

networks:
  aria-net:
    driver: bridge

volumes:
  aria_memory:
